{% extends 'layout.html' %}
{% block content %}
    <div class="container">
        <div class="panel panel-default">
            <div class="panel-heading">
                <span class="glyphicon glyphicon-list" aria-hidden="true"></span>
                新增员工
            </div>
            <div class="panel-body">
                <form class="col-lg-offset-1 col-lg-10" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label> 姓名 </label>
                        <input type="text" class="form-control" placeholder="姓名" name="name">
                    </div>
                    <div class="form-group">
                        <label> 性别 </label>
                        <select class="form-control" name="gender">
                            {% for item in gender_choice %}
                                <option value="{{ item.0 }}">{{ item.1 }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label> 年龄 </label>
                        <input type="text" class="form-control" placeholder="年龄" name="age">
                    </div>
                    <div class="form-group">
                        <label> 余额 </label>
                        <input type="text" class="form-control" placeholder="余额" name="account">
                    </div>
                    <div class="form-group">
                        <label> 密码 </label>
                        <input type="password" class="form-control" placeholder="密码" name="pwd">
                    </div>
                    <div class="form-group">
                        <label> 入职时间 </label>
                        <input type="text" class="form-control" placeholder="入职时间" name="ctime">
                    </div>
                    <div class="form-group">
                        <label> 所属部门 </label>
                        <select class="form-control" name="depart">
                            {% for item in department_list %}
                                <option value="{{ item.id }}">{{ item.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <div class="col-sm-offset-1 col-sm-10">
                            <button type="submit" class="btn bg-primary">保 存</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
