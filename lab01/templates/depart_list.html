{% extends 'layout.html' %}

{% block content %}

    <div class="container">
        <div class="btn" aria-label="...">
            <button type="button" class="btn btn-success">
                <span class="glyphicon glyphicon-plus-sign" aria-hidden="true"></span>
                <a style="color: white" href="/depart/add">新建部门</a>
            </button>
        </div>
        <div class="panel panel-default">

            <div class="panel-heading">
                <span class="glyphicon glyphicon-list" aria-hidden="true"></span>
                部门列表
            </div>

            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>部门名称</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                {% for item in depart %}
                    <tr>
                        <td>{{ item.id }}</td>
                        <td>{{ item.name }}</td>
                        <td>
                            <a type="button" class="btn btn-primary btn-xs" href="/depart/{{ item.id }}/edit/">编辑</a>
                            <a type="button" class="btn btn-danger btn-xs"
                               href="/depart/delete/?nid={{ item.id }}">删除</a>

                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

{% endblock %}
