{% extends 'lab_templates/expe_layout.html' %}
{% block content %}
    <div class="container">
        <div class="panel panel-default">
            <div class="panel-heading">
                <span class="glyphicon glyphicon-list" aria-hidden="true"></span>
                New Project
            </div>
            <div class="panel-body">
                <form method="post" class="col-lg-offset-1 col-lg-10" novalidate>
                    {% csrf_token %}
                    <div class="form-group">
                        <label>{{ form.proj_num.label }} </label>:{{ form.proj_num }}
                        <div style="color: red">{{ form.proj_num.errors.0 }}</div>
                        </div>
                    <div class="form-group">
                        <label>{{ form.proj_name.label }} </label>:{{ form.proj_name }}
                        <div style="color: red">{{ form.proj_name.errors.0 }}</div>
                    </div>
                    <div class="form-group">
                        <label>{{ form.apply_time.label }} </label>:{{ form.apply_time }}
                        <span style="color: red">{{ form.apply_time.errors.0 }}</span>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-1 col-sm-10">
                            <button type="submit" class="btn bg-primary">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
